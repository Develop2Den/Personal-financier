# Spring Profile:
spring.application.name=Personal-financier

# Server settings
server.port=${PORT:8080}
server.address=${SERVER_ADDRESS:localhost}

# Active profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.config.import=optional:file:.env[.properties]
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
spring.mvc.log-request-details=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

#Flyway:
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_ADDRESS}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Security
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.security.cors.allowed-methods=${APP_SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
app.security.cors.allowed-headers=${APP_SECURITY_CORS_ALLOWED_HEADERS:Authorization,Content-Type}
app.security.cors.exposed-headers=${APP_SECURITY_CORS_EXPOSED_HEADERS:Authorization}
app.security.cors.allow-credentials=${APP_SECURITY_CORS_ALLOW_CREDENTIALS:true}
app.security.cors.max-age=${APP_SECURITY_CORS_MAX_AGE:3600}
app.security.headers.content-security-policy=${APP_SECURITY_HEADERS_CSP:default-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'}
app.security.headers.permissions-policy=${APP_SECURITY_HEADERS_PERMISSIONS_POLICY:camera=(), microphone=(), geolocation=()}
