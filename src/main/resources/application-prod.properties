# ---  prod
spring.config.activate.on-profile=prod

# DB
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# production
logging.level.org.springframework.mail=INFO
logging.level.org.springframework.security=INFO
logging.level.com.d2d.personal_financier=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=ERROR
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS}
app.security.cors.allow-credentials=${APP_SECURITY_CORS_ALLOW_CREDENTIALS:false}
app.security.headers.content-security-policy=${APP_SECURITY_HEADERS_CSP:default-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'}
app.security.headers.permissions-policy=${APP_SECURITY_HEADERS_PERMISSIONS_POLICY:camera=(), microphone=(), geolocation=(), payment=()}

